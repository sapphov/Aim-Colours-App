<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>Luminora — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Profile screen overrides ───────────────────────── */
    .bg { background: #000 !important; }
    .top-nav, .light-beam, .ground-glow, .vignette { display: none; }

    /* ── Profile layout container ───────────────────────── */
    .profile-screen {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      height: calc(852px - 48px - 95px); /* minus status bar and tab bar */
      overflow: hidden;
    }

    /* ── Hamburger ───────────────────────────────────────── */
    .profile-hamburger {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      z-index: 15;
    }

    /* ── Header: info + avatar ───────────────────────────── */
    .profile-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 14px 14px 0;
    }

    .profile-info { flex: 1; }

    .profile-name {
      font-family: var(--sans);
      font-size: 23px;
      font-weight: 400;
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1.35;
    }

    .profile-meta {
      font-family: var(--sans);
      font-size: 17px;
      font-weight: 400;
      color: #dadada;
      letter-spacing: -0.02em;
      line-height: 1.35;
    }

    /* ── Avatar circle with + ────────────────────────────── */
    .profile-avatar {
      width: 77px;
      height: 77px;
      border-radius: 50%;
      background: #2d2d2d;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-left: 12px;
      cursor: pointer;
    }

    .profile-avatar-plus {
      font-size: 36px;
      font-weight: 200;
      color: #888;
      line-height: 1;
      margin-top: -2px;
    }

    /* ── Divider ─────────────────────────────────────────── */
    .profile-rule {
      height: 0.5px;
      background: rgba(255,255,255,0.35);
      margin: 0 14px 14px;
    }

    /* ── Stats row ───────────────────────────────────────── */
    .profile-stats {
      display: flex;
      justify-content: space-between;
      padding: 16px 14px 18px;
    }

    .profile-stat-right { text-align: right; }

    .stat-label {
      font-family: var(--sans);
      font-size: 17px;
      font-weight: 400;
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1.35;
    }

    .stat-value {
      font-family: var(--sans);
      font-size: 17px;
      font-weight: 400;
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1.35;
    }

    /* ── Scrollable cards ────────────────────────────────── */
    .profile-cards {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      padding: 0 21px 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .profile-cards::-webkit-scrollbar { display: none; }

    .profile-card {
      flex-shrink: 0;
      height: 248px;
      background: #dadada;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .profile-card-label {
      font-family: var(--sans);
      font-size: 17px;
      font-weight: 400;
      color: #000;
      letter-spacing: -0.02em;
      position: absolute;
      top: 10px;
      left: 10px;
    }
  </style>
</head>
<body>
<div class="phone">

  <div class="dynamic-island"></div>
  <div class="bg"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="white"><rect x="0" y="6" width="3" height="6" rx="0.5" opacity="0.3"/><rect x="4.5" y="4" width="3" height="8" rx="0.5" opacity="0.5"/><rect x="9" y="2" width="3" height="10" rx="0.5" opacity="0.7"/><rect x="13.5" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 10.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z" fill="white"/><path d="M4.9 7.4a4.4 4.4 0 0 1 6.2 0" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round"/><path d="M2.4 5a7.2 7.2 0 0 1 11.2 0" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.6"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="white" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="white"/><path d="M22.5 4v4a2 2 0 0 0 0-4z" fill="white" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Profile Screen -->
  <div class="profile-screen">

    <!-- Hamburger menu -->
    <button class="profile-hamburger" aria-label="Menu">
      <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
        <rect width="20" height="1.5" rx="0.75" fill="white"/>
        <rect y="6.25" width="20" height="1.5" rx="0.75" fill="white"/>
        <rect y="12.5" width="20" height="1.5" rx="0.75" fill="white"/>
      </svg>
    </button>

    <!-- Profile header -->
    <div class="profile-header">
      <div class="profile-info">
        <div class="profile-name">Allie Huerta</div>
        <div class="profile-meta">@alliehuerta</div>
        <div class="profile-meta">Montréal</div>
      </div>
      <div class="profile-avatar">
        <span class="profile-avatar-plus">+</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="profile-stats">
      <div class="profile-stat">
        <div class="stat-label">Friends</div>
        <div class="stat-value">100</div>
      </div>
      <div class="profile-stat profile-stat-right">
        <div class="stat-label">Points</div>
        <div class="stat-value">1000</div>
      </div>
    </div>

    <!-- Divider -->
    <div class="profile-rule"></div>

    <!-- Scrollable cards -->
    <div class="profile-cards">
      <div class="profile-card">
        <div class="profile-card-label">Colour Collection</div>
      </div>
      <div class="profile-card">
        <div class="profile-card-label">Your Accessories</div>
      </div>
      <div class="profile-card">
        <div class="profile-card-label">Etc.</div>
      </div>
      <div class="profile-card">
        <div class="profile-card-label">Etc.</div>
      </div>
    </div>

  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tabs">
      <a class="tab" href="screen-closet.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.73V8l7.5 5.5A2 2 0 0 1 22 15v1a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-1a2 2 0 0 1 .5-1.5L10 8V6.73A2 2 0 0 1 12 3z"/></svg>
        </div>
        <div class="tab-label">Closet</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="screen-explore.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>
        </div>
        <div class="tab-label">Explore</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="Index.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <ellipse cx="12" cy="12.5" rx="7.5" ry="5.5" stroke-width="0.9"/>
            <ellipse cx="12" cy="12.5" rx="4.8" ry="3.2" stroke-width="0.85"/>
            <ellipse cx="12" cy="12.5" rx="2.2" ry="1.4" stroke-width="0.8"/>
            <line x1="12" y1="5" x2="12" y2="20" stroke-width="0.7" stroke-dasharray="1.2 1.4"/>
            <line x1="3.5" y1="12.5" x2="20.5" y2="12.5" stroke-width="0.7" stroke-dasharray="1.2 1.4"/>
          </svg>
        </div>
        <div class="tab-label">Luminora</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab active" href="screen-profile.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-linecap="round"/></svg>
        </div>
        <div class="tab-label">Profile</div>
        <div class="tab-mark"></div>
      </a>
    </div>
    <div class="home-indicator"><div class="home-indicator-bar"></div></div>
  </div>

</div>
</body>
</html>
