<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>Luminora — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Profile screen overrides ───────────────────────── */
    .bg { background: #000 !important; }
    .light-beam, .ground-glow, .vignette { display: none; }

    /* ── Outer container ────────────────────────────────── */
    .profile-screen {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      height: calc(852px - 48px - 95px);
      overflow: hidden;
    }

    /* ── Pane toggle ────────────────────────────────────── */
    .profile-pane { display: flex; flex-direction: column; height: 100%; }
    .profile-pane.hidden { display: none; }

    /* ══ SCREEN 1: PROFILE ══════════════════════════════ */

    .profile-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 4px 14px 10px;
      flex-shrink: 0;
    }
    .profile-name {
      font-family: var(--sans);
      font-size: 23px;
      font-weight: 400;
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1.4;
    }
    .profile-meta {
      font-family: var(--sans);
      font-size: 17px;
      font-weight: 400;
      color: #dadada;
      letter-spacing: -0.02em;
      line-height: 1.4;
      margin-top: 1px;
    }
    .profile-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }
    .hamburger-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0 4px 4px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .profile-stats {
      display: flex;
      justify-content: space-between;
      padding: 8px 14px 6px;
      flex-shrink: 0;
    }
    .stat-label, .stat-val {
      font-family: var(--sans);
      font-size: 17px;
      font-weight: 400;
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1.4;
    }
    .profile-rule {
      height: 0.5px;
      background: rgba(255,255,255,0.25);
      margin: 0 14px;
      flex-shrink: 0;
    }

    .profile-cards {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      padding: 12px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      min-height: 0;
    }
    .profile-cards::-webkit-scrollbar { display: none; }

    .profile-card {
      flex-shrink: 0;
      height: 248px;
      background: #dadada;
      border-radius: 10px;
      position: relative;
    }
    .profile-card-label {
      position: absolute;
      top: 12px;
      left: 10px;
      font-family: var(--sans);
      font-size: 17px;
      font-weight: 400;
      color: #000;
      letter-spacing: -0.02em;
    }

    /* ══ SCREEN 2: SETTINGS ══════════════════════════════ */

    .settings-header {
      padding: 10px 13px 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .settings-back {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .settings-title {
      font-family: var(--sans);
      font-size: 30px;
      font-weight: 400;
      color: var(--white);
      letter-spacing: -0.02em;
    }

    .settings-menu {
      flex: 1;
      overflow-y: auto;
      padding: 0 13px;
      min-height: 0;
      scrollbar-width: none;
    }
    .settings-menu::-webkit-scrollbar { display: none; }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      cursor: pointer;
    }
    .menu-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .menu-label {
      font-family: var(--sans);
      font-size: 19px;
      font-weight: 400;
      color: var(--white);
      letter-spacing: -0.02em;
      flex: 1;
    }
    .menu-arrow { flex-shrink: 0; opacity: 0.7; }
    .menu-divider { height: 0.5px; background: rgba(255,255,255,0.15); }
  </style>
</head>

<script>
  function showSettings() {
    document.getElementById('screen1').classList.add('hidden');
    document.getElementById('screen2').classList.remove('hidden');

  function showProfile() {
    document.getElementById('screen2').classList.add('hidden');
    document.getElementById('screen1').classList.remove('hidden');
  }
</script>
