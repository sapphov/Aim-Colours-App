<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>Luminora — Home</title>
  <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');</style>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Device image — floats above background ── */
    .hero-full {
      position: relative; z-index: 5;
      width: 100%; height: 540px;
      overflow: hidden;
    }
    .hero-img {
      position: absolute;
      width: 100%; height: 100%;
      object-fit: contain; object-position: center;
      display: block;
      transform: scale(1.8);
    }
    .hero-below {
      position: relative; z-index: 5;
      padding: 18px 24px 50px;
    }
    .hero-eyebrow {
      font-family: var(--sans); font-size: 9px; letter-spacing: 0.28em;
      text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 6px;
    }
    .hero-headline {
      font-family: var(--sans); font-size: 32px; font-weight: 400; line-height: 1.1;
      color: var(--white);
    }
    .hero-headline em { font-style: italic; }
    .wordmark { font-family: var(--sans); font-weight: 400; font-size: 27px; }
    .status-value { font-family: var(--sans); font-style: normal; }
    .hero-selector {
      margin-top: 28px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 0.5px solid rgba(255,255,255,0.25); padding-bottom: 5px;
      cursor: pointer; width: fit-content;
    }
    .hero-selector .selector-label {
      font-family: var(--sans); font-size: 9.5px; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.45);
    }
    .hero-selector svg { opacity: 0.4; }

    /* push bg image below the status bar so it sits on clean black like studio-02 */
    .bg { top: 44px; }

    /* ── Status bar — copied verbatim from studio-02 ── */
    .status{height:44px;position:relative;flex-shrink:0}
    .time{font-size:15px;font-weight:500;color:#fff}
    .icons{display:flex;align-items:center;gap:6px}

    /* ── Tab bar — match studio-02 ── */
    .tab-bar { background: none; border: none; }
    .tabs { height: 72px; border-top: 0.5px solid rgba(255,255,255,.15); display: flex; align-items: center; justify-content: space-evenly; padding: 0 8px; flex-shrink: 0; }
    .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; text-decoration: none; }
    .tab-ic { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
    .tab-ic svg { height: 22px; width: 22px; }
    .tab-lbl { font-size: 7px; letter-spacing: .18em; text-transform: uppercase; color: #fff; font-weight: 500; font-family: 'Inter', sans-serif; }
    .tab-icon, .tab-label, .tab-mark { display: none; }

    .status-card { padding: 24px 28px; }
    .hero-selector { cursor: pointer; }
    .device-option {
      font-family: var(--sans); font-size: 9px; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.7);
      padding: 12px 20px; border-bottom: 0.5px solid rgba(255,255,255,0.08);
      cursor: pointer;
    }
    .device-option:last-child { border-bottom: none; }
    .device-option:hover { color: #fff; background: rgba(255,255,255,0.05); }

  </style>
</head>
<body>
<div class="phone">

  <div class="bg"></div>
  <div class="light-beam"></div>
  <div class="ground-glow"></div>
  <div class="vignette"></div>

  <!-- STATUS (shared) -->
  <div class="status">
    <img src="status-time.svg" alt="9:41" style="position:absolute;left:21px;top:12px;width:54px;height:21px;filter:brightness(0) invert(1)"/>
    <img src="status-icons.svg" alt="status icons" style="position:absolute;right:14.67px;top:17.33px;width:66.661px;height:11.336px;filter:brightness(0) invert(1)"/>
  </div>


  <!-- Wordmark -->
  <div class="top-nav">
    <div class="wordmark">Luminora</div>
  </div>

  <!-- Hero — full-bleed image -->
  <div class="hero-full">
    <img class="hero-img" src="assets/luminora Background Removed.png" alt="Luminora device" />
  </div>



  <div class="status-section" style="position:relative;">
    <div class="status-card">
      <div>
        <div class="status-value" id="connection-status">Disconnected</div>
        <div class="hero-selector" style="margin-top:10px;" onclick="toggleDeviceDropdown()">
          <span class="selector-label" id="selected-device">Select your device</span>
          <svg width="10" height="6" viewBox="0 0 12 7" fill="none" id="selector-chevron" style="transition:transform 0.2s;">
            <path d="M1 1l5 5 5-5" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>
    <div id="device-dropdown" style="display:none; position:absolute; left:28px; right:28px; bottom:calc(100% + 6px); background:#111; border:0.5px solid rgba(255,255,255,0.15); z-index:20;">
      <div class="device-option" onclick="selectDevice('Luminora One')">Luminora One</div>
      <div class="device-option" onclick="selectDevice('Luminora Two')">Luminora Two</div>
      <div class="device-option" onclick="selectDevice('Luminora Pro')">Luminora Pro</div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tabs">
      <a class="tab" href="screen-closet.html">
        <div class="tab-ic">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="opacity:.5"><path fill="white" d="M8 3a1 1 0 0 0-.943.667a.5.5 0 0 1-.942-.334a2 2 0 1 1 3.22 2.157l-.041.037c-.22.197-.419.374-.57.566c-.16.198-.223.359-.223.503c0 .219.12.42.313.524L14.16 10a1.596 1.596 0 0 1-.757 3H2.595a1.595 1.595 0 0 1-.755-3l4.423-2.38a.5.5 0 0 1 .474.88l-4.424 2.38A.595.595 0 0 0 2.595 12h10.81a.596.596 0 0 0 .282-1.12L8.34 8a1.6 1.6 0 0 1-.84-1.404c0-.462.212-.839.44-1.126c.208-.261.468-.493.674-.677l.054-.048A1 1 0 0 0 8 3"/></svg>
        </div>
        <span class="tab-lbl" style="opacity:.5">Closet</span>
      </a>
      <a class="tab" href="screen-explore.html">
        <div class="tab-ic">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="opacity:.5"><path fill="white" d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"/></svg>
        </div>
        <span class="tab-lbl" style="opacity:.5">Explore</span>
      </a>
      <a class="tab" href="index.html">
        <div class="tab-ic">
          <svg width="22" height="22" fill="none" style="transform:rotate(-30deg)">
            <ellipse cx="11" cy="11" rx="9" ry="6.5" stroke="white" stroke-width="1.3"/>
            <ellipse cx="11" cy="11" rx="5.5" ry="4" stroke="white" stroke-width="1.3"/>
            <ellipse cx="11" cy="11" rx="2" ry="1.5" stroke="white" stroke-width="1.3"/>
          </svg>
        </div>
        <span class="tab-lbl">Luminora</span>
      </a>
      <a class="tab" href="screen-profile.html">
        <div class="tab-ic">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="opacity:.5"><path fill="white" d="M8 8a3 3 0 1 0 0-6a3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0a2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1s1-4 6-4s6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/></svg>
        </div>
        <span class="tab-lbl" style="opacity:.5">Profile</span>
      </a>
    </div>
    <div class="home-indicator"><div class="home-indicator-bar"></div></div>
  </div>

</div>
<script>
  function toggleDeviceDropdown() {
    var dd = document.getElementById('device-dropdown');
    var chevron = document.getElementById('selector-chevron');
    var open = dd.style.display === 'block';
    dd.style.display = open ? 'none' : 'block';
    chevron.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
  }

  function selectDevice(name) {
    document.getElementById('selected-device').textContent = name;
    document.getElementById('connection-status').textContent = 'Connected';
    document.getElementById('status-dot').style.opacity = '1';
    document.getElementById('device-dropdown').style.display = 'none';
    document.getElementById('selector-chevron').style.transform = 'rotate(0deg)';
  }

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.status-section')) {
      document.getElementById('device-dropdown').style.display = 'none';
      document.getElementById('selector-chevron').style.transform = 'rotate(0deg)';
    }
  });
</script>
</body>
</html>
