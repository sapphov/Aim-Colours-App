<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>Luminora — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .welcome-text {
      position: absolute;
      z-index: 10;
      top: 66px;
      left: 21px;
      font-family: var(--sans);
      font-size: 30px;
      font-weight: 400;
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1.4;
      white-space: nowrap;
    }

    .device-selector {
      position: absolute;
      z-index: 10;
      top: 169px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      background: #2f2f2f;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 20px;
      padding: 8px 16px;
      cursor: pointer;
      white-space: nowrap;
    }
    .device-selector-label {
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 500;
      color: var(--white);
    }
    .device-selector-chevron {
      opacity: 0.5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .device-image {
      position: absolute;
      z-index: 5;
      top: 178px;
      left: 9px;
      width: 400px;
      height: 526px;
      object-fit: cover;
      object-position: center;
      pointer-events: none;
    }

    .connected-pill {
      position: absolute;
      z-index: 10;
      top: 643px;
      left: 50%;
      transform: translateX(-50%);
      width: 176px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(20, 20, 20, 0.75);
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .connected-pill span {
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 500;
      color: var(--white);
    }
  </style>
</head>
<body>
<div class="phone">

  <div class="dynamic-island"></div>
  <div class="bg"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="white"><rect x="0" y="6" width="3" height="6" rx="0.5" opacity="0.3"/><rect x="4.5" y="4" width="3" height="8" rx="0.5" opacity="0.5"/><rect x="9" y="2" width="3" height="10" rx="0.5" opacity="0.7"/><rect x="13.5" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 10.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z" fill="white"/><path d="M4.9 7.4a4.4 4.4 0 0 1 6.2 0" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round"/><path d="M2.4 5a7.2 7.2 0 0 1 11.2 0" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.6"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="white" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="white"/><path d="M22.5 4v4a2 2 0 0 0 0-4z" fill="white" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Welcome text -->
  <div class="welcome-text">Welcome Allie</div>

  <!-- Device selector dropdown -->
  <div class="device-selector">
    <span class="device-selector-label">Select your Luminora</span>
    <span class="device-selector-chevron">
      <svg width="12" height="8" viewBox="0 0 12 8" fill="none">
        <path d="M1 1.5L6 6.5L11 1.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
  </div>

  <!-- Device image -->
  <img class="device-image" src="assets/New luminora.png" alt="Luminora device" />

  <!-- Connected pill -->
  <div class="connected-pill">
    <span>Connected</span>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tabs">
      <a class="tab" href="screen-closet.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 9.5 L12 6.5 Q12 4 14 4 Q16 4 16 6 Q16 7.8 14 7.8"/>
            <line x1="12" y1="9.5" x2="2.5" y2="17"/>
            <line x1="12" y1="9.5" x2="21.5" y2="17"/>
            <path d="M2.5 17 Q2 17 2 17.8 Q2 18.5 2.5 18.5 L21.5 18.5 Q22 18.5 22 17.8 Q22 17 21.5 17"/>
          </svg>
        </div>
        <div class="tab-label">Closet</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="screen-explore.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>
        </div>
        <div class="tab-label">Explore</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab active" href="index.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M12,12 C11,8.5 7,6 4,7.5 C2,9 4,13 12,12Z"/>
            <path d="M12,12 C13,8.5 17,6 20,7.5 C22,9 20,13 12,12Z"/>
            <path d="M12,12 C11,15.5 7,17.5 4,16 C2,14.5 4,11 12,12Z"/>
            <path d="M12,12 C13,15.5 17,17.5 20,16 C22,14.5 20,11 12,12Z"/>
          </svg>
        </div>
        <div class="tab-label">Luminora</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="screen-profile.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-linecap="round"/></svg>
        </div>
        <div class="tab-label">Profile</div>
        <div class="tab-mark"></div>
      </a>
    </div>
    <div class="home-indicator"><div class="home-indicator-bar"></div></div>
  </div>

</div>
</body>
</html>
