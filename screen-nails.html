<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>Aim Colours — Nails</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Nails screen — white theme override ───────────────── */
    .phone.nails-screen { background: #fff; }

    /* Status bar — dark text on white */
    .nails-screen .status-time { color: #000; }

    /* Header */
    .nails-header {
      position: relative; z-index: 10;
      display: flex; align-items: center;
      padding: 6px 16px 10px;
      gap: 0;
    }
    .nails-back {
      font-size: 22px; color: #000; line-height: 1;
      display: flex; align-items: center; flex-shrink: 0;
    }
    .nails-title {
      font-family: var(--sans);
      font-size: 30px; font-weight: 400;
      color: #000; letter-spacing: -0.02em;
      flex: 1; padding-left: 6px;
    }
    .nails-palette {
      width: 32px; height: 32px; flex-shrink: 0;
    }
    .nails-palette img { width: 100%; height: 100%; object-fit: contain; }

    /* Scrollable content area */
    .nails-content {
      position: absolute;
      top: 88px; left: 0; right: 0; bottom: 95px;
      overflow-y: auto; overflow-x: hidden;
      padding: 0 11px 16px;
      scrollbar-width: none;
    }
    .nails-content::-webkit-scrollbar { display: none; }

    /* Section */
    .nail-section { margin-bottom: 0; padding-bottom: 16px; }
    .nail-section-label {
      font-family: var(--sans);
      font-size: 19px; font-weight: 400;
      color: #000; letter-spacing: -0.02em;
      margin-bottom: 8px; padding-top: 4px;
    }

    /* Horizontally scrollable nail row */
    .nail-scroll-wrap {
      position: relative;
      height: 144px; overflow: hidden;
    }
    .nail-row {
      display: flex;
      gap: 76px;
      align-items: center;
      height: 114px;
      overflow-x: auto; overflow-y: hidden;
      scrollbar-width: none;
      padding: 0 18px;
    }
    .nail-row::-webkit-scrollbar { display: none; }

    /* Individual nail bottle */
    .nail-bottle {
      flex-shrink: 0;
      width: 65px; height: 114px;
      overflow: hidden; position: relative;
    }
    .nail-bottle img {
      position: absolute;
      max-width: none;
    }
    /* 3 distinct crops matching the Figma per-position offsets */
    .nail-bottle.crop-a img { width: 320%;   height: 275.24%; left: -188.44%; top: -151.59%; }
    .nail-bottle.crop-b img { width: 315.84%; height: 269.56%; left: -186.06%; top: -14.51%; }
    .nail-bottle.crop-c img { width: 321.8%;  height: 274.63%; left: -27.78%;  top: -14%; }

    /* Scroll indicator */
    .nail-track {
      position: absolute; bottom: 6px; left: 4px; right: 4px;
      height: 2px; background: #2f2f2f; border-radius: 1px;
    }
    .nail-thumb {
      position: absolute; bottom: 6px; left: 18px;
      height: 2px; width: 23px;
      background: #000; border-radius: 1px;
      transition: left 0.1s;
    }

    /* Tab bar — light theme */
    .nails-screen .tab-bar {
      background: rgba(255,255,255,0.9);
      border-top: 0.5px solid rgba(0,0,0,0.1);
    }
    .nails-screen .tab-label { color: rgba(0,0,0,0.35); }
    .nails-screen .tab.active .tab-label { color: #000; }
    .nails-screen .tab-icon svg { color: rgba(0,0,0,0.35); }
    .nails-screen .tab.active .tab-icon svg { color: #000; stroke: #000; }
    .nails-screen .tab-mark { background: #000; }
    .nails-screen .home-indicator-bar { background: rgba(0,0,0,0.25); }
  </style>
</head>
<body>
<div class="phone nails-screen">

    <div class="status-icons">

        <rect x="4.5" y="4" width="3" height="8" rx="0.5" opacity="0.5"/>
        <rect x="9" y="2" width="3" height="10" rx="0.5" opacity="0.7"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5"/>

        <path d="M8 10.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z" fill="black"/>

    </div>
  </div>

    <div class="nails-back">&#8592;</div>
    <div class="nails-title">Nails</div>
    <div class="nails-palette">

  </div>

  <!-- Scrollable Content -->
  <div class="nails-content">

    <!-- Archive -->
    <div class="nail-section">
      <div class="nail-section-label">Archive</div>
      <div class="nail-scroll-wrap">
        <div class="nail-row" id="row-archive">
          <div class="nail-bottle crop-a"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-b"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-c"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-c"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-b"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-c"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
        </div>

        <div class="nail-thumb" id="thumb-archive"></div>

    </div>

    <!-- Created by Friends -->
    <div class="nail-section">
      <div class="nail-section-label">Created by Friends</div>
      <div class="nail-scroll-wrap">
        <div class="nail-row" id="row-friends">
          <div class="nail-bottle crop-a"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-b"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-c"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-c"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-b"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-c"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
        </div>
        <div class="nail-track"></div>
        <div class="nail-thumb" id="thumb-friends"></div>

    </div>

    <!-- Recently Worn -->
    <div class="nail-section">
      <div class="nail-section-label">Recently Worn</div>
      <div class="nail-scroll-wrap">
        <div class="nail-row" id="row-recent">
          <div class="nail-bottle crop-a"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-b"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-c"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-c"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-b"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-c"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>

    <!-- Recommended -->

      <div class="nail-section-label">Recommended</div>
      <div class="nail-scroll-wrap">
        <div class="nail-row" id="row-recommended">
          <div class="nail-bottle crop-a"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-b"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-c"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-c"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-b"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>
          <div class="nail-bottle crop-c"><img src="https://www.figma.com/api/mcp/asset/87bf6a81-bef9-4df7-9f7c-d75397e1184c" alt="nail polish" /></div>

  <!-- Tab Bar -->

    <div class="tabs">
      <a class="tab active" href="screen-closet.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.73V8l7.5 5.5A2 2 0 0 1 22 15v1a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-1a2 2 0 0 1 .5-1.5L10 8V6.73A2 2 0 0 1 12 3z"/></svg>
        </div>
        <div class="tab-label">Closet</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="screen-explore.html">

        </div>
        <div class="tab-label">Explore</div>

      <a class="tab" href="index.html">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">

            <ellipse cx="12" cy="12.5" rx="5" ry="3.5" stroke-width="1"/>

</div>

<script>
  // Animate scroll thumbs as each row is scrolled
  const rows = [
    { row: 'row-archive',     thumb: 'thumb-archive' },
    { row: 'row-friends',     thumb: 'thumb-friends' },
    { row: 'row-recent',      thumb: 'thumb-recent' },
    { row: 'row-recommended', thumb: 'thumb-recommended' },
  ];

  rows.forEach(({ row, thumb }) => {
    const rowEl   = document.getElementById(row);
    const thumbEl = document.getElementById(thumb);
    if (!rowEl || !thumbEl) return;

    const trackWidth = 370 - 4 - 4; // matches nail-track width (left:4 right:4 on a 370px wrap area)
    const thumbWidth = 23;

    rowEl.addEventListener('scroll', () => {
      const scrollMax  = rowEl.scrollWidth - rowEl.clientWidth;
      const ratio      = scrollMax > 0 ? rowEl.scrollLeft / scrollMax : 0;
      const maxLeft    = trackWidth - thumbWidth + 4; // offset by track's left:4
      thumbEl.style.left = (4 + ratio * (maxLeft - 4)) + 'px';
    });
  });
</script>
</body>
</html>
