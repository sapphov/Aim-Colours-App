<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>Luminora — Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Connection screen background ───────────────────────── */
    .conn-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 48%,
        #745374 0%,
        #573e57 18%,
        #3a2a3a 38%,
        #2c1f2c 50%,
        #1d151d 65%,
        #0a050a 85%,
        #000 100%
      );
    }

    /* Subtle vertical light beam at top center */
    .conn-beam {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 320px;
      z-index: 1;
      background: linear-gradient(to bottom, rgba(180,140,180,0.18) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ── Content layer ───────────────────────────────────────── */
    .conn-content {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    /* Welcome heading */
    .conn-welcome {
      position: absolute;
      top: 53px;
      left: 21px;
      font-family: var(--sans);
      font-size: 30px;
      font-weight: 400;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1.4;
    }

    /* Dropdown */
    .conn-dropdown {
      position: absolute;
      top: 169px;
      left: 87px;
      width: 220px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #2f2f2f;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 20px;
      padding: 0 16px;
      cursor: pointer;
    }
    .conn-dropdown-label {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
    }
    .conn-dropdown-chevron {
      opacity: 0.5;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .conn-dropdown-chevron svg {
      width: 14px;
      height: 14px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Product image */
    .conn-device {
      position: absolute;
      top: 286px;
      left: 79px;
      width: 217px;
      height: 279px;
      overflow: hidden;
    }
    .conn-device img {
      position: absolute;
      width: 202%;
      height: 132%;
      left: -44%;
      top: -13%;
      max-width: none;
      object-fit: cover;
    }

    /* Connect button */
    .conn-btn {
      position: absolute;
      top: 643px;
      left: 109px;
      width: 176px;
      height: 36px;
      background: rgba(60, 55, 60, 0.85);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }
    .conn-btn span {
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 500;
      color: #fff;
    }
  </style>
</head>
<body>
<div class="phone">

  <div class="dynamic-island"></div>

  <!-- Background -->
  <div class="conn-bg"></div>
  <div class="conn-beam"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="white"><rect x="0" y="6" width="3" height="6" rx="0.5" opacity="0.3"/><rect x="4.5" y="4" width="3" height="8" rx="0.5" opacity="0.5"/><rect x="9" y="2" width="3" height="10" rx="0.5" opacity="0.7"/><rect x="13.5" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 10.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z" fill="white"/><path d="M4.9 7.4a4.4 4.4 0 0 1 6.2 0" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round"/><path d="M2.4 5a7.2 7.2 0 0 1 11.2 0" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.6"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="white" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="white"/><path d="M22.5 4v4a2 2 0 0 0 0-4z" fill="white" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Screen Content -->
  <div class="conn-content">

    <!-- Welcome Heading -->
    <div class="conn-welcome">Welcome Allie</div>

    <!-- Dropdown -->
    <div class="conn-dropdown">
      <span class="conn-dropdown-label">Select your Luminora</span>
      <span class="conn-dropdown-chevron">
        <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </span>
    </div>

    <!-- Device Image -->
    <div class="conn-device">
      <img
        src="https://www.figma.com/api/mcp/asset/7db6adf2-9bc6-4d64-9a56-728620b34ad7"
        alt="Luminora device"
      />
    </div>

    <!-- Connect Button -->
    <a class="conn-btn" href="#">
      <span>Connect</span>
    </a>

  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tabs">
      <a class="tab" href="screen-closet.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.73V8l7.5 5.5A2 2 0 0 1 22 15v1a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-1a2 2 0 0 1 .5-1.5L10 8V6.73A2 2 0 0 1 12 3z"/></svg>
        </div>
        <div class="tab-label">Closet</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="screen-explore.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>
        </div>
        <div class="tab-label">Explore</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab active" href="screen-connection.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <ellipse cx="12" cy="12.5" rx="7.5" ry="5.5" stroke-width="0.9"/>
            <ellipse cx="12" cy="12.5" rx="4.8" ry="3.2" stroke-width="0.85"/>
            <ellipse cx="12" cy="12.5" rx="2.2" ry="1.4" stroke-width="0.8"/>
            <line x1="12" y1="5" x2="12" y2="20" stroke-width="0.7" stroke-dasharray="1.2 1.4"/>
            <line x1="3.5" y1="12.5" x2="20.5" y2="12.5" stroke-width="0.7" stroke-dasharray="1.2 1.4"/>
          </svg>
        </div>
        <div class="tab-label">Luminora</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="screen-profile.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-linecap="round"/></svg>
        </div>
        <div class="tab-label">Profile</div>
        <div class="tab-mark"></div>
      </a>
    </div>
    <div class="home-indicator"><div class="home-indicator-bar"></div></div>
  </div>

</div>
</body>
</html>
