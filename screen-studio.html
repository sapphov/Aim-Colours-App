<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>Luminora — Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Studio screen — white overlay ──────────────────────── */
    .studio-overlay {
      position: absolute;
      inset: 0;
      background: #ffffff;
      z-index: 15;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Status bar — dark icons for light background */
    .studio-status-bar {
      height: 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 28px 0;
      flex-shrink: 0;
    }
    .studio-status-bar .studio-time {
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 0.02em;
    }
    .studio-status-bar .studio-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Header: back arrow + title */
    .studio-header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 12px 16px 6px;
      flex-shrink: 0;
    }
    .studio-back {
      position: absolute;
      left: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      color: #35201f;
      cursor: pointer;
    }
    .studio-back svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .studio-title {
      font-family: var(--sans);
      font-size: 20px;
      font-weight: 500;
      color: #35201f;
      letter-spacing: 0;
    }

    /* Toolbar: undo/redo | bookmark/clear */
    .studio-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 8px;
      flex-shrink: 0;
    }
    .toolbar-group {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .toolbar-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #35201f;
    }
    .toolbar-btn svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Illustration canvas */
    .studio-canvas {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 24px;
      min-height: 0;
    }
    .studio-canvas img {
      max-width: 277px;
      max-height: 297px;
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    /* Transfer button */
    .studio-transfer-btn {
      align-self: center;
      width: 196px;
      height: 38px;
      background: #dadada;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 400;
      color: #000;
      cursor: pointer;
      flex-shrink: 0;
      margin-bottom: 28px;
    }

    /* Home indicator — dark pill for white bg */
    .studio-home-indicator {
      display: flex;
      justify-content: center;
      padding: 0 0 10px;
      flex-shrink: 0;
    }
    .studio-home-indicator-bar {
      width: 144px;
      height: 5px;
      background: #000;
      border-radius: 100px;
    }
  </style>
</head>
<body>
<div class="phone">

  <div class="dynamic-island"></div>

  <!-- Studio Screen Overlay -->
  <div class="studio-overlay">

    <!-- Status Bar -->
    <div class="studio-status-bar">
      <span class="studio-time">9:41</span>
      <div class="studio-icons">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="#1a1a1a"><rect x="0" y="6" width="3" height="6" rx="0.5" opacity="0.3"/><rect x="4.5" y="4" width="3" height="8" rx="0.5" opacity="0.5"/><rect x="9" y="2" width="3" height="10" rx="0.5" opacity="0.7"/><rect x="13.5" y="0" width="3" height="12" rx="0.5"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 10.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z" fill="#1a1a1a"/><path d="M4.9 7.4a4.4 4.4 0 0 1 6.2 0" stroke="#1a1a1a" stroke-width="1.4" fill="none" stroke-linecap="round"/><path d="M2.4 5a7.2 7.2 0 0 1 11.2 0" stroke="#1a1a1a" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.6"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#1a1a1a" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="#1a1a1a"/><path d="M22.5 4v4a2 2 0 0 0 0-4z" fill="#1a1a1a" opacity="0.4"/></svg>
      </div>
    </div>

    <!-- Header -->
    <div class="studio-header">
      <a class="studio-back" href="javascript:history.back()">
        <svg viewBox="0 0 24 24">
          <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
        </svg>
      </a>
      <h1 class="studio-title">Allie's Studio</h1>
    </div>

    <!-- Toolbar -->
    <div class="studio-toolbar">
      <div class="toolbar-group">
        <!-- Undo -->
        <div class="toolbar-btn">
          <svg viewBox="0 0 24 24">
            <path d="M9 14 4 9l5-5"/>
            <path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/>
          </svg>
        </div>
        <!-- Redo -->
        <div class="toolbar-btn">
          <svg viewBox="0 0 24 24">
            <path d="m15 14 5-5-5-5"/>
            <path d="M20 9H9.5a5.5 5.5 0 0 0 0 11H13"/>
          </svg>
        </div>
      </div>
      <div class="toolbar-group">
        <!-- Bookmark -->
        <div class="toolbar-btn">
          <svg viewBox="0 0 24 24">
            <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
          </svg>
        </div>
        <!-- Clear -->
        <div class="toolbar-btn">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"/>
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Illustration / Canvas -->
    <div class="studio-canvas">
      <img
        src="https://www.figma.com/api/mcp/asset/d0dd61a4-72f8-41f1-88d6-63a8c6214e76"
        alt="Studio illustration"
      />
    </div>

    <!-- Transfer Button -->
    <a class="studio-transfer-btn" href="#">Transfer</a>

    <!-- Home Indicator -->
    <div class="studio-home-indicator">
      <div class="studio-home-indicator-bar"></div>
    </div>

  </div><!-- /studio-overlay -->

</div><!-- /phone -->
</body>
</html>
