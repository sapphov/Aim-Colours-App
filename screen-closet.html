<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>Luminora — Closet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Override background to solid black ─────────────────── */
    .bg { background: #000; }

    /* ── Closet screen content ───────────────────────────────── */
    .closet-wrap {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      /* phone (852px) minus status bar (48px), padded for tab bar */
      height: 804px;
      padding-bottom: 82px;
    }

    /* Header */
    .closet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 22px 14px 18px;
      flex-shrink: 0;
    }
    .closet-title {
      font-family: var(--sans);
      font-size: 28px;
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.1;
    }
    .closet-header-icons {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .closet-header-icons svg {
      cursor: pointer;
    }

    /* Pendant / canvas area */
    .closet-pendant {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .closet-pendant img {
      width: 400%;
      max-height: 400%;
      object-fit: contain;
      filter: invert(1);
      mix-blend-mode: screen;
    }

    /* Undo / Redo */
    .closet-undoredo {
      display: flex;
      justify-content: space-between;
      padding: 12px 22px 8px;
      flex-shrink: 0;
    }
    .closet-undoredo svg { cursor: pointer; }

    /* Swatches */
    .closet-swatches {
      padding: 0 22px;
      flex-shrink: 0;
    }
    .swatch-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }
    .swatch {
      aspect-ratio: 1;
      border-radius: 2px;
      cursor: pointer;
    }
    .swatch.selected {
      outline: 1.5px solid rgba(255,255,255,0.85);
      outline-offset: 1px;
    }

    /* Category nav links */
    .closet-categories {
      display: flex;
      gap: 10px;
      padding: 0 18px 12px;
      flex-shrink: 0;
    }
    .closet-category-link {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      border: 0.5px solid rgba(255,255,255,0.25);
      border-radius: 100px;
      padding: 5px 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .closet-category-link:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.7);
    }

    /* Transfer button */
    .closet-cta-wrap {
      padding: 14px 22px 0;
      flex-shrink: 0;
    }
    .closet-cta {
      display: block;
      width: 100%;
      border: 0.5px solid rgba(255,255,255,1);
      background: transparent;
      color: #fff;
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      padding: 13px;
      border-radius: 100px;
      text-align: center;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="phone">

  <div class="dynamic-island"></div>
  <div class="bg"></div>
  <div class="light-beam"></div>
  <div class="ground-glow"></div>
  <div class="vignette"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="white"><rect x="0" y="6" width="3" height="6" rx="0.5" opacity="0.3"/><rect x="4.5" y="4" width="3" height="8" rx="0.5" opacity="0.5"/><rect x="9" y="2" width="3" height="10" rx="0.5" opacity="0.7"/><rect x="13.5" y="0" width="3" height="12" rx="0.5"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 10.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z" fill="white"/><path d="M4.9 7.4a4.4 4.4 0 0 1 6.2 0" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round"/><path d="M2.4 5a7.2 7.2 0 0 1 11.2 0" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.6"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="white" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="white"/><path d="M22.5 4v4a2 2 0 0 0 0-4z" fill="white" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Closet Content -->
  <div class="closet-wrap">

    <!-- Header -->
    <div class="closet-header">
      <div class="closet-title">Allie's Studio</div>
      <div class="closet-header-icons">
        <!-- Cancel / X -->
        <svg width="20" height="20" fill="none">
          <circle cx="10" cy="10" r="8" stroke="white" stroke-width="1.3"/>
          <path d="M7 7L13 13M13 7L7 13" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <!-- Bookmark -->
        <svg width="20" height="22" fill="none">
          <path d="M4 2H16C16.6 2 17 2.4 17 3V20L10 16L3 20V3C3 2.4 3.4 2 4 2Z" stroke="white" stroke-width="1.3" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Category links -->
    <div class="closet-categories">
      <a class="closet-category-link" href="screen-sunglasses.html">Sunglasses</a>
      <a class="closet-category-link" href="screen-pendants.html">Pendants</a>
      <a class="closet-category-link" href="screen-nails.html">Nails</a>
    </div>

    <!-- Pendant / Canvas -->
    <div class="closet-pendant">
      <img src="Empty%20pendant.png" alt="Pendant design" />
    </div>

    <!-- Undo / Redo -->
    <div class="closet-undoredo">
      <svg width="20" height="20" fill="none">
        <path d="M4 8H13C16 8 18 10 18 13C18 16 16 18 13 18H8" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M7 5L4 8L7 11" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg width="20" height="20" fill="none">
        <path d="M16 8H7C4 8 2 10 2 13C2 16 4 18 7 18H12" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M13 5L16 8L13 11" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Colour Swatches -->
    <div class="closet-swatches">
      <div class="swatch-row">
        <div class="swatch selected" style="background:#A89080"></div>
        <div class="swatch" style="background:#C28A9A"></div>
        <div class="swatch" style="background:#B87080"></div>
        <div class="swatch" style="background:#8A2030"></div>
        <div class="swatch" style="background:#601830"></div>
      </div>
      <div class="swatch-row">
        <div class="swatch" style="background:#A09020"></div>
        <div class="swatch" style="background:#607040"></div>
        <div class="swatch" style="background:#1E7060"></div>
        <div class="swatch" style="background:#2C4880"></div>
        <div class="swatch" style="background:#6070A0"></div>
      </div>
    </div>

    <!-- Transfer Button -->
    <div class="closet-cta-wrap">
      <a class="closet-cta" href="#">Transfer</a>
    </div>

  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tabs">
      <a class="tab active" href="screen-closet.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3a2 2 0 0 1 2 2c0 .74-.4 1.38-1 1.73V8l7.5 5.5A2 2 0 0 1 22 15v1a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-1a2 2 0 0 1 .5-1.5L10 8V6.73A2 2 0 0 1 12 3z"/></svg>
        </div>
        <div class="tab-label">Closet</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="screen-explore.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>
        </div>
        <div class="tab-label">Explore</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="index.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <ellipse cx="12" cy="12.5" rx="7.5" ry="5.5" stroke-width="0.9"/>
            <ellipse cx="12" cy="12.5" rx="4.8" ry="3.2" stroke-width="0.85"/>
            <ellipse cx="12" cy="12.5" rx="2.2" ry="1.4" stroke-width="0.8"/>
            <line x1="12" y1="5" x2="12" y2="20" stroke-width="0.7" stroke-dasharray="1.2 1.4"/>
            <line x1="3.5" y1="12.5" x2="20.5" y2="12.5" stroke-width="0.7" stroke-dasharray="1.2 1.4"/>
          </svg>
        </div>
        <div class="tab-label">Luminora</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="screen-profile.html">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-linecap="round"/></svg>
        </div>
        <div class="tab-label">Profile</div>
        <div class="tab-mark"></div>
      </a>
    </div>
    <div class="home-indicator"><div class="home-indicator-bar"></div></div>
  </div>

</div>
</body>
</html>
