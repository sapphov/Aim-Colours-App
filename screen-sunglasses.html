<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>Aim Colours — Sunglasses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Sunglasses screen — white theme ─────────────────────── */
    .phone.sunglasses-screen { background: #fff; }
    .sunglasses-screen .status-time { color: #000; }

    /* Header */
    .sunglasses-header {
      position: relative; z-index: 10;
      display: flex; align-items: center;
      padding: 6px 16px 10px; gap: 0;
    }
    .sunglasses-back {
      font-size: 22px; color: #000; line-height: 1;
      display: flex; align-items: center; flex-shrink: 0;
    }
    .sunglasses-title {
      font-family: var(--sans);
      font-size: 30px; font-weight: 400;
      color: #000; letter-spacing: -0.02em;
      flex: 1; padding-left: 6px;
    }
    .sunglasses-palette {
      width: 32px; height: 32px; flex-shrink: 0;
    }
    .sunglasses-palette img { width: 100%; height: 100%; object-fit: contain; }

    /* Scrollable content area */
    .sunglasses-content {
      position: absolute;
      top: 88px; left: 0; right: 0; bottom: 95px;
      overflow-y: auto; overflow-x: hidden;
      padding: 0 0 16px;
      scrollbar-width: none;
    }
    .sunglasses-content::-webkit-scrollbar { display: none; }

    /* Section */
    .glasses-section { margin-bottom: 0; padding-bottom: 16px; }
    .glasses-section-label {
      font-family: var(--sans);
      font-size: 19px; font-weight: 400;
      color: #000; letter-spacing: -0.02em;
      margin-bottom: 0; padding: 4px 11px 8px;
    }

    /* Horizontally scrollable glasses row */
    .glasses-scroll-wrap {
      position: relative;
      height: 126px; overflow: hidden;
    }
    .glasses-row {
      position: absolute;
      top: 10px; left: 0; right: 0;
      display: flex;
      gap: 43px;
      align-items: center;
      height: 100px;
      overflow-x: auto; overflow-y: visible;
      scrollbar-width: none;
      padding-left: 16px;
      padding-right: 20px;
    }
    .glasses-row::-webkit-scrollbar { display: none; }

    /* Individual glasses item */
    .glasses-item {
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .glasses-item.type-a,
    .glasses-item.type-b,
    .glasses-item.type-c { width: 160px; height: 80px; }

    .glasses-item img {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    /* Scroll indicator */
    .glasses-track {
      position: absolute; bottom: 4px; left: 4px; right: 4px;
      height: 2px; background: #2f2f2f; border-radius: 1px;
    }
    .glasses-thumb {
      position: absolute; bottom: 4px; left: 24px;
      height: 2px; width: 23px;
      background: #000; border-radius: 1px;
      transition: left 0.1s;
    }

    /* Tab bar — exact match to studio-02 */
    .sunglasses-screen .tab-bar {
      background: #0d0d0d;
      border-top: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      padding: 0;
    }
    .sunglasses-screen .tabs {
      height: 72px;
      border-top: 0.5px solid rgba(255,255,255,0.15);
      align-items: center;
      justify-content: space-evenly;
      padding: 0 8px;
    }
    .sunglasses-screen .tab { gap: 3px; }
    .sunglasses-screen .tab-icon { width: 24px; height: 24px; }
    .sunglasses-screen .tab-icon svg { width: 22px; height: 22px; }
    .sunglasses-screen .tab-label {
      font-size: 7px; letter-spacing: 0.18em; font-weight: 500; color: #fff;
    }
    .sunglasses-screen .tab-mark { display: none; }
    .sunglasses-screen .home-indicator {
      height: 34px; padding: 0; align-items: center;
    }
    .sunglasses-screen .home-indicator-bar {
      height: 5px; border-radius: 3px; background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
<div class="phone sunglasses-screen">

  <div class="dynamic-island"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <img src="status-time.svg" alt="9:41" style="position:absolute;left:21px;top:12px;width:54px;height:21px;filter:brightness(0)"/>
    <img src="status-icons.svg" alt="status icons" style="position:absolute;right:14.67px;top:17.33px;width:66.661px;height:11.336px;filter:brightness(0)"/>
  </div>

  <!-- Page Header -->
  <div class="sunglasses-header">
    <a class="sunglasses-back" href="screen-closet.html">&#8592;</a>
    <div class="sunglasses-title">Sunglasses</div>
    <div class="sunglasses-palette">
      <img src="https://www.figma.com/api/mcp/asset/c39afe89-d458-4aed-9a22-717234ef799e" alt="palette" />
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="sunglasses-content">

    <!-- Archive -->
    <div class="glasses-section">
      <div class="glasses-section-label">Archive</div>
      <div class="glasses-scroll-wrap">
        <div class="glasses-row" id="row-archive">
          <div class="glasses-item type-a"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-b"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-c"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-a"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
        </div>
        <div class="glasses-track"></div>
        <div class="glasses-thumb" id="thumb-archive"></div>
      </div>
    </div>

    <!-- Created by Friends -->
    <div class="glasses-section">
      <div class="glasses-section-label">Created by Friends</div>
      <div class="glasses-scroll-wrap">
        <div class="glasses-row" id="row-friends">
          <div class="glasses-item type-c"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-a"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-b"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-c"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
        </div>
        <div class="glasses-track"></div>
        <div class="glasses-thumb" id="thumb-friends"></div>
      </div>
    </div>

    <!-- Recently Worn -->
    <div class="glasses-section">
      <div class="glasses-section-label">Recently Worn</div>
      <div class="glasses-scroll-wrap">
        <div class="glasses-row" id="row-recent">
          <div class="glasses-item type-b"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-c"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-a"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-b"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
        </div>
        <div class="glasses-track"></div>
        <div class="glasses-thumb" id="thumb-recent"></div>
      </div>
    </div>

  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tabs">
      <a class="tab active" href="screen-closet.html">
        <div class="tab-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 16 16"><path fill="white" d="M8 3a1 1 0 0 0-.943.667a.5.5 0 0 1-.942-.334a2 2 0 1 1 3.22 2.157l-.041.037c-.22.197-.419.374-.57.566c-.16.198-.223.359-.223.503c0 .219.12.42.313.524L14.16 10a1.596 1.596 0 0 1-.757 3H2.595a1.595 1.595 0 0 1-.755-3l4.423-2.38a.5.5 0 0 1 .474.88l-4.424 2.38A.595.595 0 0 0 2.595 12h10.81a.596.596 0 0 0 .282-1.12L8.34 8a1.6 1.6 0 0 1-.84-1.404c0-.462.212-.839.44-1.126c.208-.261.468-.493.674-.677l.054-.048A1 1 0 0 0 8 3"/></svg>
        </div>
        <div class="tab-label">Closet</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="screen-explore.html">
        <div class="tab-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" style="opacity:.5"><path fill="white" d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"/></svg>
        </div>
        <div class="tab-label">Explore</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="index.html">
        <div class="tab-icon">
          <svg width="22" height="22" fill="none" style="transform:rotate(-30deg)">
            <ellipse cx="11" cy="11" rx="9" ry="6.5" stroke="white" stroke-width="1.3" opacity=".5"/>
            <ellipse cx="11" cy="11" rx="5.5" ry="4" stroke="white" stroke-width="1.3" opacity=".5"/>
            <ellipse cx="11" cy="11" rx="2" ry="1.5" stroke="white" stroke-width="1.3" opacity=".5"/>
          </svg>
        </div>
        <div class="tab-label">Luminora</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="screen-profile.html">
        <div class="tab-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 16 16" style="opacity:.5"><path fill="white" d="M8 8a3 3 0 1 0 0-6a3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0a2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1s1-4 6-4s6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/></svg>
        </div>
        <div class="tab-label">Profile</div>
        <div class="tab-mark"></div>
      </a>
    </div>
    <div class="home-indicator"><div class="home-indicator-bar"></div></div>
  </div>

</div>

<script>
  const rows = [
    { row: 'row-archive', thumb: 'thumb-archive' },
    { row: 'row-friends', thumb: 'thumb-friends' },
    { row: 'row-recent',  thumb: 'thumb-recent'  },
  ];

  rows.forEach(({ row, thumb }) => {
    const rowEl   = document.getElementById(row);
    const thumbEl = document.getElementById(thumb);
    if (!rowEl || !thumbEl) return;

    const trackWidth = 362;
    const thumbWidth = 23;

    rowEl.addEventListener('scroll', () => {
      const scrollMax = rowEl.scrollWidth - rowEl.clientWidth;
      const ratio     = scrollMax > 0 ? rowEl.scrollLeft / scrollMax : 0;
      thumbEl.style.left = (24 + ratio * (trackWidth - thumbWidth)) + 'px';
    });
  });
</script>
</body>
</html>
