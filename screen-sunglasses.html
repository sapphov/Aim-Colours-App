<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>Aim Colours — Sunglasses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Sunglasses screen — dark editorial theme ─────────────── */
    .phone.sunglasses-screen {
      background: #05020a;
    }

    /* Status bar — white icons on dark */
    .sunglasses-screen .status-time { color: #fff; }

    /* Header */
    .sunglasses-header {
      position: relative; z-index: 10;
      display: flex; align-items: center;
      padding: 6px 20px 12px;
    }
    .sunglasses-back {
      font-size: 20px; color: rgba(255,255,255,0.7); line-height: 1;
      display: flex; align-items: center; flex-shrink: 0;
      margin-right: 2px;
    }
    .sunglasses-title {
      font-family: var(--sans);
      font-size: 28px; font-weight: 300;
      color: #fff; letter-spacing: -0.01em;
      flex: 1; padding-left: 4px;
    }
    .sunglasses-palette {
      width: 28px; height: 28px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.7;
    }
    .sunglasses-palette svg { width: 22px; height: 22px; }

    /* Thin rule under header */
    .sunglasses-rule {
      height: 0.5px;
      background: rgba(255,255,255,0.1);
      margin: 0 20px;
    }

    /* Scrollable content area */
    .sunglasses-content {
      position: absolute;
      top: 96px; left: 0; right: 0; bottom: 82px;
      overflow-y: auto; overflow-x: hidden;
      padding: 0 0 16px;
      scrollbar-width: none;
    }
    .sunglasses-content::-webkit-scrollbar { display: none; }

    /* Section */
    .glasses-section {
      padding: 20px 0 0;
      border-bottom: 0.5px solid rgba(255,255,255,0.07);
    }
    .glasses-section:last-child { border-bottom: none; }

    .glasses-section-label {
      font-family: var(--sans);
      font-size: 9px; font-weight: 500;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.25em; text-transform: uppercase;
      padding: 0 20px 12px;
    }

    /* Horizontally scrollable glasses row */
    .glasses-scroll-wrap {
      position: relative;
      height: 130px; overflow: hidden;
    }
    .glasses-row {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      gap: 24px;
      align-items: center;
      height: 110px;
      overflow-x: auto; overflow-y: visible;
      scrollbar-width: none;
      padding: 0 20px;
    }
    .glasses-row::-webkit-scrollbar { display: none; }

    /* Individual glasses item */
    .glasses-item {
      flex-shrink: 0;
      position: relative;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
    }
    .glasses-item.type-a,
    .glasses-item.type-b,
    .glasses-item.type-c {
      width: 158px; height: 90px;
    }

    .glasses-item img {
      width: 85%; height: 80%;
      object-fit: contain;
      filter: brightness(1.1) contrast(1.05);
    }

    /* Scroll indicator — light on dark */
    .glasses-scroll-indicator {
      display: flex; align-items: center;
      padding: 10px 20px 20px;
    }
    .glasses-track {
      position: relative;
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.12);
      border-radius: 1px;
    }
    .glasses-thumb {
      position: absolute;
      left: 0; top: 0;
      height: 1px; width: 40px;
      background: rgba(255,255,255,0.5);
      border-radius: 1px;
      transition: left 0.1s;
    }

    /* Tab bar — dark editorial */
    .sunglasses-screen .tab-bar {
      background: rgba(5,2,10,0.92);
      border-top: 0.5px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .sunglasses-screen .tabs {
      padding: 10px 0 0;
      justify-content: space-around;
    }
    .sunglasses-screen .tab-label {
      font-size: 8px; letter-spacing: 0.2em; font-weight: 500;
      color: rgba(255,255,255,0.35); text-transform: uppercase;
    }
    .sunglasses-screen .tab.active .tab-label {
      color: #fff;
    }
    .sunglasses-screen .tab-icon svg {
      color: rgba(255,255,255,0.3);
      stroke: rgba(255,255,255,0.3);
    }
    .sunglasses-screen .tab.active .tab-icon svg {
      color: #fff; stroke: #fff;
    }
    .sunglasses-screen .tab-mark {
      background: rgba(255,255,255,0.8);
    }
    .sunglasses-screen .home-indicator-bar {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
<div class="phone sunglasses-screen">

  <div class="dynamic-island"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="white">
        <rect x="0" y="6" width="3" height="6" rx="0.5" opacity="0.3"/>
        <rect x="4.5" y="4" width="3" height="8" rx="0.5" opacity="0.5"/>
        <rect x="9" y="2" width="3" height="10" rx="0.5" opacity="0.7"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12">
        <path d="M8 10.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z" fill="white"/>
        <path d="M4.9 7.4a4.4 4.4 0 0 1 6.2 0" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <path d="M2.4 5a7.2 7.2 0 0 1 11.2 0" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.6"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="white" stroke-width="1" fill="none" opacity="0.35"/>
        <rect x="2" y="2" width="17" height="8" rx="1.5" fill="white"/>
        <path d="M22.5 4v4a2 2 0 0 0 0-4z" fill="white" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Page Header -->
  <div class="sunglasses-header">
    <a class="sunglasses-back" href="screen-closet.html">&#8592;</a>
    <div class="sunglasses-title">Sunglasses</div>
    <div class="sunglasses-palette">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="14" r="12.5" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
        <circle cx="14" cy="8" r="2" fill="rgba(255,255,255,0.6)"/>
        <circle cx="19" cy="11.5" r="2" fill="rgba(255,255,255,0.6)"/>
        <circle cx="19" cy="18" r="2" fill="rgba(255,255,255,0.6)"/>
        <circle cx="14" cy="21" r="2" fill="rgba(255,255,255,0.6)"/>
        <circle cx="9" cy="18" r="2" fill="rgba(255,255,255,0.6)"/>
        <circle cx="9" cy="11.5" r="2" fill="rgba(255,255,255,0.6)"/>
      </svg>
    </div>
  </div>
  <div class="sunglasses-rule"></div>

  <!-- Scrollable Content -->
  <div class="sunglasses-content">

    <!-- Archive -->
    <div class="glasses-section">
      <div class="glasses-section-label">Archive</div>
      <div class="glasses-scroll-wrap">
        <div class="glasses-row" id="row-archive">
          <div class="glasses-item type-a"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-b"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-c"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-a"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
        </div>
      </div>
      <div class="glasses-scroll-indicator">
        <div class="glasses-track"><div class="glasses-thumb" id="thumb-archive"></div></div>
      </div>
    </div>

    <!-- Created by Friends -->
    <div class="glasses-section">
      <div class="glasses-section-label">Created by Friends</div>
      <div class="glasses-scroll-wrap">
        <div class="glasses-row" id="row-friends">
          <div class="glasses-item type-c"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-a"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-b"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-c"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
        </div>
      </div>
      <div class="glasses-scroll-indicator">
        <div class="glasses-track"><div class="glasses-thumb" id="thumb-friends"></div></div>
      </div>
    </div>

    <!-- Recently Worn -->
    <div class="glasses-section">
      <div class="glasses-section-label">Recently Worn</div>
      <div class="glasses-scroll-wrap">
        <div class="glasses-row" id="row-recent">
          <div class="glasses-item type-b"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-c"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-a"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
          <div class="glasses-item type-b"><img src="assets/sunglasses.svg" alt="sunglasses" /></div>
        </div>
      </div>
      <div class="glasses-scroll-indicator">
        <div class="glasses-track"><div class="glasses-thumb" id="thumb-recent"></div></div>
      </div>
    </div>

  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tabs">
      <a class="tab active" href="screen-closet.html">
        <div class="tab-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 16 16"><path fill="white" d="M8 3a1 1 0 0 0-.943.667a.5.5 0 0 1-.942-.334a2 2 0 1 1 3.22 2.157l-.041.037c-.22.197-.419.374-.57.566c-.16.198-.223.359-.223.503c0 .219.12.42.313.524L14.16 10a1.596 1.596 0 0 1-.757 3H2.595a1.595 1.595 0 0 1-.755-3l4.423-2.38a.5.5 0 0 1 .474.88l-4.424 2.38A.595.595 0 0 0 2.595 12h10.81a.596.596 0 0 0 .282-1.12L8.34 8a1.6 1.6 0 0 1-.84-1.404c0-.462.212-.839.44-1.126c.208-.261.468-.493.674-.677l.054-.048A1 1 0 0 0 8 3"/></svg>
        </div>
        <div class="tab-label">Closet</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="screen-explore.html">
        <div class="tab-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"><path fill="white" d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"/></svg>
        </div>
        <div class="tab-label">Explore</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="index.html">
        <div class="tab-icon">
          <img src="assets/luminora-icon.png" alt="Luminora" style="width:22px;height:22px;object-fit:contain;opacity:0.5;" />
        </div>
        <div class="tab-label">Luminora</div>
        <div class="tab-mark"></div>
      </a>
      <a class="tab" href="screen-profile.html">
        <div class="tab-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 16 16"><path fill="white" d="M8 8a3 3 0 1 0 0-6a3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0a2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1s1-4 6-4s6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/></svg>
        </div>
        <div class="tab-label">Profile</div>
        <div class="tab-mark"></div>
      </a>
    </div>
    <div class="home-indicator"><div class="home-indicator-bar"></div></div>
  </div>

</div>

<script>
  const rows = [
    { row: 'row-archive', thumb: 'thumb-archive' },
    { row: 'row-friends', thumb: 'thumb-friends' },
    { row: 'row-recent',  thumb: 'thumb-recent'  },
  ];

  rows.forEach(({ row, thumb }) => {
    const rowEl   = document.getElementById(row);
    const thumbEl = document.getElementById(thumb);
    if (!rowEl || !thumbEl) return;

    rowEl.addEventListener('scroll', () => {
      const scrollMax = rowEl.scrollWidth - rowEl.clientWidth;
      const ratio     = scrollMax > 0 ? rowEl.scrollLeft / scrollMax : 0;
      const trackEl   = thumbEl.parentElement;
      const maxLeft   = trackEl.clientWidth - thumbEl.offsetWidth;
      thumbEl.style.left = (ratio * maxLeft) + 'px';
    });
  });
</script>
</body>
</html>
